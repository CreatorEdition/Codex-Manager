name: publish-github-release
description: Create or update a GitHub release and upload release assets.

inputs:
  tag:
    description: Release tag
    required: true
  ref:
    description: Git ref or branch
    required: true
  prerelease-input:
    description: auto, true, or false
    required: true
  assets-dir:
    description: Directory containing staged release assets
    required: false
    default: release-assets

runs:
  using: composite
  steps:
    - name: Publish GitHub Release
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        GH_REPO: ${{ github.repository }}
      run: |
        set -euo pipefail

        TAG="${{ inputs.tag }}"
        REF="${{ inputs.ref }}"
        PRERELEASE_INPUT="${{ inputs.prerelease-input }}"
        ASSETS_DIR="${{ inputs.assets-dir }}"
        CHANGELOG_PATH="docs/zh-CN/CHANGELOG.md"
        RELEASE_NOTES_FILE="$(mktemp)"

        if [[ -z "$TAG" ]]; then
          echo "release tag is required"
          exit 1
        fi
        if [[ "$TAG" != v* ]]; then
          TAG="v$TAG"
        fi

        TARGET_SHA="$(gh api "repos/$GH_REPO/commits/$REF" --jq .sha)"
        if [[ -z "$TARGET_SHA" ]]; then
          echo "failed to resolve ref to commit: $REF"
          exit 1
        fi

        case "$PRERELEASE_INPUT" in
          true|false)
            PRERELEASE="$PRERELEASE_INPUT"
            ;;
          auto)
            if [[ "$TAG" == *-* ]]; then
              PRERELEASE="true"
            else
              PRERELEASE="false"
            fi
            ;;
          *)
            echo "invalid prerelease input: $PRERELEASE_INPUT"
            exit 1
            ;;
        esac

        TITLE="CodexManager $TAG"
        mapfile -t FILES < <(find "$ASSETS_DIR" -type f \( \
          -name '*.exe' -o -name '*.zip' -o -name '*.dmg' -o -name '*.AppImage' -o -name '*.deb' \
        \) | sort)
        if [ "${#FILES[@]}" -eq 0 ]; then
          echo "No release assets found."
          exit 1
        fi

        write_release_notes() {
          local version
          version="${TAG#v}"
          if [[ ! -f "$CHANGELOG_PATH" ]]; then
            echo "changelog not found: $CHANGELOG_PATH"
            exit 1
          fi

          if ! awk -v version="$version" '
            index($0, "## [" version "]") == 1 {
              in_section = 1
              found = 1
              print
              next
            }
            in_section && $0 ~ /^## \[/ {
              exit
            }
            in_section {
              print
            }
            END {
              if (!found) {
                exit 42
              }
            }
          ' "$CHANGELOG_PATH" > "$RELEASE_NOTES_FILE"; then
            echo "missing changelog section for $TAG in $CHANGELOG_PATH"
            echo "expected heading prefix: ## [$version]"
            exit 1
          fi

          if [[ ! -s "$RELEASE_NOTES_FILE" ]]; then
            echo "empty release notes generated for $TAG"
            exit 1
          fi
        }

        write_release_notes

        sync_release_meta() {
          local release_id payload body
          release_id="$(gh api "repos/$GH_REPO/releases/tags/$TAG" --jq .id)"
          if [[ -z "$release_id" ]]; then
            echo "failed to resolve release id for tag: $TAG"
            exit 1
          fi
          body="$(cat "$RELEASE_NOTES_FILE")"
          payload="$(jq -n \
            --arg name "$TITLE" \
            --arg target_commitish "$TARGET_SHA" \
            --arg body "$body" \
            --argjson prerelease "$PRERELEASE" \
            '{name: $name, target_commitish: $target_commitish, body: $body, prerelease: $prerelease}')"
          printf '%s' "$payload" | gh api "repos/$GH_REPO/releases/$release_id" --method PATCH --input -
        }

        delete_stale_release_assets() {
          local release_id asset_count
          release_id="$(gh api "repos/$GH_REPO/releases/tags/$TAG" --jq .id)"
          if [[ -z "$release_id" ]]; then
            echo "failed to resolve release id for tag: $TAG"
            exit 1
          fi

          asset_count="$(gh api "repos/$GH_REPO/releases/$release_id/assets" --paginate --jq 'length' | awk '{sum += $1} END {print sum + 0}')"
          if [[ "$asset_count" -eq 0 ]]; then
            echo "No existing release assets to clean."
            return
          fi

          mapfile -t STALE_ASSETS < <(
            gh api "repos/$GH_REPO/releases/$release_id/assets" --paginate \
              --jq '.[] | select(.name | test("^(CodexManager|codexmanager)[_-].*|^docker-compose\\.release\\.yml$")) | "\(.id)\t\(.name)"'
          )
          if [ "${#STALE_ASSETS[@]}" -eq 0 ]; then
            echo "No stale CodexManager release assets matched cleanup rules."
            return
          fi

          for entry in "${STALE_ASSETS[@]}"; do
            local asset_id asset_name
            asset_id="${entry%%$'\t'*}"
            asset_name="${entry#*$'\t'}"
            echo "Deleting stale release asset: $asset_name"
            gh api "repos/$GH_REPO/releases/assets/$asset_id" --method DELETE >/dev/null
          done
        }

        if gh release view "$TAG" --repo "$GH_REPO" >/dev/null 2>&1; then
          sync_release_meta
          delete_stale_release_assets
          gh release upload "$TAG" "${FILES[@]}" --repo "$GH_REPO" --clobber
        else
          CREATE_ARGS=(--repo "$GH_REPO" --title "$TITLE" --target "$TARGET_SHA" --notes-file "$RELEASE_NOTES_FILE")
          if [ "$PRERELEASE" = "true" ]; then
            CREATE_ARGS+=(--prerelease)
          fi
          if ! gh release create "$TAG" "${FILES[@]}" "${CREATE_ARGS[@]}"; then
            echo "release create failed, retrying as edit+upload..."
            sync_release_meta
            delete_stale_release_assets
            gh release upload "$TAG" "${FILES[@]}" --repo "$GH_REPO" --clobber
          fi
        fi
